  <div class="field-hill field-hill--near"></div>
</div>
<div class="field-flowers" aria-hidden="true">

  <span class="field-flower" style="left:8%;bottom:16%;animation-delay:0s;"></span>
  <span class="field-flower" style="left:15%;bottom:14%;animation-delay:0.8s;"></span>
