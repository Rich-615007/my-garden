<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>揉碎星辰 · 个人花园</title>
<link rel="stylesheet" href="style.css">
<style>
/* ══════ 主页专属样式 ══════ */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif; background:#FCF5E8; color:#4A3728; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* Hero Banner */
.hero {
  position:relative; max-width:1100px; margin:0 auto;
  min-height:92vh; display:flex; align-items:center; justify-content:center;
  padding:0 40px;
}
.hero-bg {
  position:fixed; top:0; left:0; right:0; height:100vh; z-index:-1;
  background:linear-gradient(175deg, #1a1a2e 0%, #16213e 30%, #1a2744 55%, #1e3a5f 80%, #2d5a7b 100%);
}
.hero-bg::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:40%;
  background:linear-gradient(0deg, rgba(252,245,232,0.95) 0%, rgba(252,245,232,0.6) 40%, transparent 100%);
  pointer-events:none;
}

.hero-content { text-align:center; z-index:10; max-width:600px; }
.hero-name { font-size:2.8rem; font-weight:800; color:#F8F0E0; letter-spacing:.08em; margin-bottom:8px; }
.hero-sub { font-size:1.05rem; color:#A8B8CC; letter-spacing:.04em; margin-bottom:16px; }
.hero-divider { width:60px; height:2px; background:rgba(200,150,80,0.5); margin:0 auto 16px; }
.hero-about { font-size:.95rem; color:#8899BB; line-height:1.8; margin-bottom:28px; }
.hero-about p { margin-bottom:4px; }
.hero-nav { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
.hero-nav a {
  display:inline-block; padding:10px 22px; border-radius:24px;
  background:rgba(255,255,255,0.08); color:#CCD5E0; text-decoration:none;
  font-size:.9rem; letter-spacing:.04em; border:1px solid rgba(255,255,255,0.12);
  transition:all .25s;
}
.hero-nav a:hover { background:rgba(255,255,255,0.15); color:#F8F0E0; border-color:rgba(200,150,80,0.4); transform:translateY(-1px); }

/* 海报墙 */
.poster-wall { position:fixed; top:0; left:0; right:0; height:70vh; z-index:-1; overflow:hidden; pointer-events:none; }
.poster-wall img { position:absolute; border-radius:6px; opacity:0.12; filter:blur(0.5px); transition:opacity .5s; object-fit:cover; }
.poster-wall img:nth-child(1) { left:3%; top:8%; width:140px; height:196px; animation:floatPoster 8s ease-in-out infinite; }
.poster-wall img:nth-child(2) { left:18%; top:15%; width:120px; height:168px; animation:floatPoster 10s ease-in-out 1s infinite; }
.poster-wall img:nth-child(3) { right:5%; top:5%; width:150px; height:210px; animation:floatPoster 9s ease-in-out 2s infinite; }
.poster-wall img:nth-child(4) { right:20%; top:10%; width:110px; height:154px; animation:floatPoster 11s ease-in-out 0.5s infinite; }
.poster-wall img:nth-child(5) { left:10%; top:50%; width:100px; height:140px; animation:floatPoster 12s ease-in-out 3s infinite; }
.poster-wall img:nth-child(6) { right:10%; top:45%; width:130px; height:182px; animation:floatPoster 9s ease-in-out 1.5s infinite; }

@keyframes floatPoster {
  0%,100% { transform:translateY(0) rotate(0deg); }
  33%     { transform:translateY(-8px) rotate(1deg); }
  66%     { transform:translateY(6px) rotate(-0.5deg); }
}

/* 内容区 */
.content { position:relative; max-width:1000px; margin:0 auto; padding:0 40px 60px; z-index:10; }

/* Nav Card 区块 */
.section-title { font-size:1.1rem; font-weight:700; color:#5B3E2E; margin-bottom:16px; letter-spacing:.05em; }
.nav-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:40px; }
.nav-card {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:20px 16px; border-radius:12px; background:rgba(255,252,246,0.82);
  border:1px solid rgba(180,155,125,0.2); text-decoration:none;
  transition:all .25s;
}
.nav-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(120,90,60,0.1); }
.nav-card-icon { font-size:2rem; margin-bottom:2px; }
.nav-card-title { font-size:.95rem; font-weight:600; color:#5B3E2E; }
.nav-card-count { font-size:.78rem; color:#A09080; }

/* 精选卡片 */
.featured { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
.feat-card {
  display:flex; gap:14px; padding:14px 16px; border-radius:10px;
  background:rgba(255,252,246,0.82); border:1px solid rgba(180,155,125,0.2);
  transition:all .25s; text-decoration:none; color:inherit;
}
.feat-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(120,90,60,0.08); }
.feat-cover { width:64px; height:88px; border-radius:4px; object-fit:cover; flex-shrink:0; }
.feat-info { display:flex; flex-direction:column; gap:3px; justify-content:center; min-width:0; }
.feat-title { font-size:.85rem; font-weight:600; color:#4A3728; }
.feat-sub { font-size:.76rem; color:#8B7355; }

@media(max-width:750px){
  .hero-name{font-size:2rem}
  .nav-cards{grid-template-columns:repeat(2,1fr)}
  .featured{grid-template-columns:1fr}
}
@media(max-width:500px){
  .nav-cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- 深色Hero背景 -->
<div class="hero-bg"></div>

<!-- 海报墙 -->
<div class="poster-wall">
  <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx2167-pSDBcyc0vjej.jpg" alt="">
  <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx30-AI1zr74Dh4ye.jpg" alt="">
  <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx16498-buvcRTBx4NSm.jpg" alt="">
  <img src="https://cdn.myanimelist.net/images/anime/1299/110774l.jpg" alt="">
  <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx9756-QnUGwlwwnsuN.jpg" alt="">
  <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx1535-kUgkcrfOrkUM.jpg" alt="">
</div>

<!-- Hero -->
<section class="hero">

    <h1 class="hero-name">揉碎星辰</h1>
    <p class="hero-sub">一个存放热爱的地方</p>
    <div class="hero-divider"></div>
    <div class="hero-about">
      <p>喜欢动漫、轻小说、音乐和游戏。</p>
      <p>在别人的故事里找到自己，也试着写出属于自己的故事。</p>
    </div>
    <div class="hero-nav">
      <a href="anime/">📺 追番</a>
      <a href="lightnovel/">📝 轻小说</a>
      <a href="music/">🎵 音乐</a>
      <a href="create/">🎮 创作</a>
      <a href="about/">✦ 关于</a>
    </div>
  </div>
</section>

<script>
// 滚动时海报淡出
const posters = document.querySelectorAll('.poster-wall img');
window.addEventListener('scroll', () => {
  const opacity = Math.max(0, 1 - window.scrollY / 500);
  posters.forEach(p => p.style.opacity = opacity * 0.12);
});
</script>

  <script src="js/guide-characters.js"></script>
  <script src="js/guide-widget.js"></script>
</body>
</html>
