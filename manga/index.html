<style>
.manga-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.manga-card {
  display:flex; gap:14px; padding:14px; border-radius:var(--radius);
  background:var(--card); border:1px solid var(--border);
  cursor:pointer; transition:transform .2s,box-shadow .2s,background .2s;
}
.manga-card:hover { transform:translateY(-2px); box-shadow:0 4px 18px rgba(120,90,60,.12); background:rgba(255,248,236,.9); }
.manga-cover { width:64px; height:90px; border-radius:3px; flex-shrink:0; object-fit:cover; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.manga-meta { display:flex; flex-direction:column; gap:4px; min-width:0; justify-content:center; }
.manga-title { font-size:.9rem; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.manga-sub { font-size:.74rem; color:var(--soft); display:flex; gap:6px; flex-wrap:wrap; }
.manga-sub span { background:rgba(200,160,110,.12); padding:2px 6px; border-radius:3px; }
.manga-sub .status-tag { font-weight:600; }

.mag-section { margin-bottom:28px; }
.mag-head {
  font-size:1rem; font-weight:700; color:var(--brown);
  padding:8px 0 6px; margin-bottom:12px;
  border-bottom:2px solid rgba(180,150,120,.25); letter-spacing:.04em;
  cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
}
.mag-head::after { content:'▼'; font-size:.65rem; color:var(--soft); transition:transform .25s; }
.mag-head.collapsed::after { transform:rotate(-90deg); }
.mag-head small { font-weight:400; font-size:.78rem; color:var(--soft); margin-left:8px; }

.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(40,25,10,.55); backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px); z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .25s,visibility .25s;
}
.modal-overlay.active { opacity:1; visibility:visible; }
.modal-box {
  background:rgba(255,252,246,.96); border-radius:8px; max-width:620px; width:92%;
  max-height:82vh; overflow-y:auto; box-shadow:0 8px 40px rgba(60,30,10,.25);
  display:flex; gap:20px; padding:24px; position:relative;
  transform:translateY(12px); transition:transform .25s;
}
.modal-overlay.active .modal-box { transform:translateY(0); }
.modal-close {
  position:absolute; top:12px; right:16px; width:28px; height:28px;
  border:none; background:none; font-size:1.2rem; color:var(--soft);
  cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:rgba(180,140,100,.12); color:var(--text); }
.modal-cover-big { width:140px; height:196px; border-radius:4px; object-fit:cover; flex-shrink:0; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.modal-info { display:flex; flex-direction:column; gap:10px; min-width:0; }
.modal-title { font-size:1.2rem; font-weight:700; color:var(--brown); line-height:1.3; }
.modal-meta-row { display:flex; gap:10px; flex-wrap:wrap; font-size:.82rem; color:var(--soft); }
.modal-meta-row span { background:rgba(200,160,110,.1); padding:2px 8px; border-radius:3px; }
.modal-score { font-weight:700; color:var(--accent); }
.modal-synopsis { font-size:.85rem; color:var(--text); line-height:1.8; }

@media(max-width:750px){
  .manga-grid{grid-template-columns:1fr}
  .modal-box{flex-direction:column;align-items:center;padding:20px}
  .modal-cover-big{width:120px;height:168px}
}
</style>
</head>

<script>
// ========== 漫画数据库 ==========
const DB = [
  /* ── 周刊少年Jump ── */
  {id:'m01',cn:'Dr.STONE',en:'Dr.STONE',mag:'周刊少年Jump',y:2017,v:27,c:236,sc:8.1,author:'稻垣理一郎',artist:'Boichi',st:'已完结',g:['科幻','冒险','喜剧'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/b98416-L44f4idEGMAX.jpg',sp:'全人类瞬间石化。数千年后天才少年石神千空复活。从零开始重建文明。全27卷已完结。'},
  {id:'m02',cn:'Dr.STONE reboot:百夜',en:'Dr.STONE reboot',mag:'周刊少年Jump',y:2019,v:1,c:9,sc:7.6,author:'稻垣理一郎',artist:'Boichi',st:'已完结',g:['科幻','冒险'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx112673-ppxmIwBve158.jpg',sp:'百夜——千空的亲生父亲。石化的那一天他在宇宙空间站上。外传讲述千空之父的故事。'},
  {id:'m03',cn:'电锯人',en:'Chainsaw Man',mag:'周刊少年Jump',y:2018,v:24,c:232,sc:8.5,author:'藤本树',artist:'藤本树',st:'连载中',g:['动作','奇幻','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx105778-euxXZEIfDY2u.png',sp:'欠债少年淀治与电锯恶魔波奇塔融合成为恶魔猎人。藤本树的疯狂与天才之作。'},
  {id:'m04',cn:'JoJo 幻影之血',en:'JoJo Phantom Blood',mag:'周刊少年Jump',y:1986,v:5,c:44,sc:7.0,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx31517-Y3pL6OTH74Iq.png',sp:'19世纪英国。乔纳森与Dio的宿命对决。波纹气功石鬼面。一切从这里开始。'},
  {id:'m05',cn:'JoJo 战斗潮流',en:'JoJo Battle Tendency',mag:'周刊少年Jump',y:1987,v:7,c:69,sc:7.8,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx31630-Fg8JERVKuWB5.jpg',sp:'第二部。乔瑟夫·乔斯达——最狡猾的JoJo。对抗柱之男。波纹战斗的巅峰。'},
  {id:'m06',cn:'JoJo 星尘斗士',en:'JoJo Stardust Crusaders',mag:'周刊少年Jump',y:1989,v:16,c:152,sc:7.8,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx30872-BZM8n264VdlV.png',sp:'第三部。承太郎觉醒替身能力——白金之星。为了救母亲踏上前往埃及的旅途。替身时代的开端。'},
  {id:'m07',cn:'JoJo 不灭钻石',en:'JoJo Diamond',mag:'周刊少年Jump',y:1992,v:18,c:174,sc:8.4,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx33006-uFu4BInfxXNx.png',sp:'第四部。东方仗助在杜王町。替身能力进化到新高度。吉良吉影——只想平静生活的连环杀手。'},
  {id:'m08',cn:'JoJo 黄金之风',en:'JoJo Golden Wind',mag:'周刊少年Jump',y:1995,v:17,c:155,sc:8.0,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx33008-HBnMTIGwREaV.png',sp:'第五部。乔鲁诺加入黑帮目标是黑帮之星。意大利风替身战斗的巅峰。'},
  {id:'m09',cn:'JoJo 石之海',en:'JoJo Stone Ocean',mag:'周刊少年Jump',y:1999,v:17,c:158,sc:8.2,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx33009-jF9dqLJcZC4n.png',sp:'第六部。空条徐伦被陷害入狱绿海豚监狱。乔斯达家族百年宿命的终结。'},
  {id:'m15',cn:'JoJo 飙马野郎',en:'JoJo Steel Ball Run',mag:'Ultra Jump',y:2004,v:24,c:95,sc:9.2,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx31706-lRncu9VbcBB7.png',sp:'第七部平行世界。横跨美国的赛马大赛。乔尼与杰洛。JOJO史上最高评分9.2。'},
  {id:'m11',cn:'JoJo JoJolion',en:'JoJo JoJolion',mag:'Ultra Jump',y:2011,v:27,c:110,sc:8.5,author:'荒木飞吕彦',artist:'荒木飞吕彦',st:'已完结',g:['动作','冒险','奇幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx55515-HhCsfAsd7VK1.png',sp:'第八部。杜王町的诅咒。东方定助失去了记忆。JoJolion意为被祝福的JoJo。'},
  /* ── 周刊少年Magazine ── */
  {id:'m12',cn:'炎炎消防队',en:'Enen no Shouboutai',mag:'周刊少年Magazine',y:2015,v:34,c:305,sc:7.8,author:'大久保笃',artist:'大久保笃',st:'已完结',g:['动作','奇幻','科幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx86310-OraykJ8bRNTr.jpg',sp:'人会突然自燃变成焰人。特殊消防队是为了解开人体自燃之谜而战斗的组织。森罗日下部以英雄为目标。全34卷已完结。'},
  /* ── Manga Time Kirara ── */
  {id:'m13',cn:'轻音少女',en:'K-On!',mag:'Manga Time Kirara',y:2007,v:4,c:57,sc:7.4,author:'かきふらい',artist:'かきふらい',st:'已完结',g:['音乐','喜剧','日常'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx43001-yRE3yBmYoIrV.jpg',sp:'平泽唯——连谱都看不懂的高一新生，阴差阳错加入了轻音部。喝茶吃点心偶尔练习。四格漫画代表作。全4卷。'},
  /* ── 月刊Comic电击大王 ── */
  {id:'m14',cn:'某科学的超电磁炮',en:'Toaru Kagaku no Railgun',mag:'月刊Comic电击大王',y:2007,v:21,c:180,sc:8.1,author:'鎌池和馬',artist:'冬川基',st:'连载中',g:['动作','科幻','喜剧'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/nx37776-4DWOI7BlCEPq.jpg',sp:'学园都市Level 5御坂美琴——最强电击公主。科学侧的日常与战斗。超电磁炮，发射！动画化后人气爆发的超人气漫画。'},
  /* ── 电击魔王 ── */
  {id:'m15',cn:'人妻女教师被女高中生迷得神魂颠倒',en:'Hitozuma Kyoushi',mag:'电击魔王',y:2025,v:0,c:0,sc:5.9,author:'入间人间',artist:'?',st:'连载中',g:['恋爱','校园','喜剧'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx196670-ZUidu9NCsjaW.jpg',sp:'人妻女教师被女高中生迷得神魂颠倒。入间人间的百合漫画新作。'},
  {id:'m16',cn:'人妻与JK',en:'Hitozuma to JK',mag:'电击魔王',y:2020,v:0,c:0,sc:6.2,author:'烧肉定食',artist:'烧肉定食',st:'连载中',g:['恋爱','喜剧'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx130551-287PZIS64R03.jpg',sp:'人妻与JK——烧肉定食的代表作。跨越年龄的恋爱喜剧。'},
  {id:'m17',cn:'和机器人啪啪啪能算在经验次数里吗',en:'Android wa Keiken Ninzuu ni Hairimasu ka',mag:'电击魔王',y:2021,v:7,c:0,sc:6.9,author:'烧肉定食',artist:'烧肉定食',st:'已完结',g:['恋爱','喜剧','科幻'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx136508-VPiHtLM3t6Zv.jpg',sp:'和机器人啪啪啪能算在经验次数里吗？烧肉定食的科幻恋爱喜剧。全7卷已完结。'},
];

// ========== 按杂志分组 ==========
const magOrder = ['电击魔王','Ultra Jump','周刊少年Jump',];
const groups = {};
DB.forEach(m => {
  const mag = m.mag;
  if (!groups[mag]) groups[mag] = [];
  groups[mag].push(m);
  if (!magOrder.includes(mag)) magOrder.push(mag);
});
for (const mag in groups) {
  groups[mag].sort((a,b) => a.y - b.y || (a.c||0) - (b.c||0));
}

// ========== 渲染 ==========
const root = document.getElementById('mangaRoot');
const overlay = document.getElementById('modalOverlay');

magOrder.forEach(mag => {
  const items = groups[mag];
  if (!items) return;
  const sec = document.createElement('div');
  sec.className = 'mag-section';
  sec.innerHTML = `<div class="mag-head">📰 ${mag}<small>${items.length} 部</small></div>
    <div class="manga-grid"></div>`;
  root.appendChild(sec);
  const head = sec.querySelector('.mag-head');
  const grid = sec.querySelector('.manga-grid');
  head.addEventListener('click', () => {
    head.classList.toggle('collapsed');
    grid.style.display = grid.style.display === 'none' ? '' : 'none';
  });

  items.forEach(m => {
    const card = document.createElement('div');
    card.className = 'manga-card';
    let sub = `<span>${m.y}</span><span>${m.g[0]}</span><span>${m.author}</span>`;
    if (m.st) sub += `<span class="status-tag">${m.st}</span>`;
    card.innerHTML =
      `<img class="manga-cover" src="${m.cv}" alt="${m.cn}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2290%22><rect fill=%22%23E8D5B8%22 width=%2264%22 height=%2290%22/><text x=%2232%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23B09070%22 font-size=%2224%22>📖</text></svg>';">
       <div class="manga-meta">
         <span class="manga-title">${m.cn}</span>
         <div class="manga-sub">${sub}</div>
       </div>`;
    card.addEventListener('click', () => openModal(m));
    grid.appendChild(card);
  });
});

function openModal(m) {
  document.getElementById('modalCover').src = m.cv;
  document.getElementById('modalTitle').textContent = m.cn;
  document.getElementById('modalMeta').innerHTML =
    `<span>📅 ${m.y}</span> <span>📖 ${m.v}卷</span> <span>✒️ ${m.author}</span> <span>🎨 ${m.artist}</span> <span>📰 ${m.mag}</span> <span class="modal-score">⭐ ${m.sc}</span> <span>${m.g.join(' · ')}</span>`;
  if (m.st) document.getElementById('modalMeta').innerHTML += `<span>${m.st}</span>`;
  document.getElementById('modalSynopsis').textContent = m.sp;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  overlay.classList.remove('active'); document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
