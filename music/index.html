<link rel="stylesheet" href="../style.css">
<style>
.music-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.music-card {
  display:flex; gap:14px; padding:14px; border-radius:var(--radius);
  background:var(--card); border:1px solid var(--border);
  cursor:pointer; transition:transform .2s,box-shadow .2s,background .2s;
}
.music-card:hover { transform:translateY(-2px); box-shadow:0 4px 18px rgba(120,90,60,.12); background:rgba(255,248,236,.9); }
.music-cover { width:64px; height:64px; border-radius:4px; flex-shrink:0; object-fit:cover; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.music-meta { display:flex; flex-direction:column; gap:3px; min-width:0; justify-content:center; }
.music-title { font-size:.88rem; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.music-sub { font-size:.72rem; color:var(--soft); display:flex; gap:5px; flex-wrap:wrap; line-height:1.4; }
.music-sub span { background:rgba(200,160,110,.1); padding:1px 6px; border-radius:3px; }

.artist-section { margin-bottom:28px; }
.artist-head {
  font-size:1rem; font-weight:700; color:var(--brown);
  padding:8px 0 6px; margin-bottom:12px;
  border-bottom:2px solid rgba(180,150,120,.25); letter-spacing:.04em;
  cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
}
.artist-head::after { content:'▼'; font-size:.65rem; color:var(--soft); transition:transform .25s; }
.artist-head.collapsed::after { transform:rotate(-90deg); }
.artist-head small { font-weight:400; font-size:.78rem; color:var(--soft); margin-left:8px; }
.btn-all {
  display:inline-block; margin-bottom:12px; padding:4px 14px; border-radius:16px;
  background:rgba(200,160,100,.12); color:var(--soft); font-size:.78rem;
  cursor:pointer; border:none; transition:background .2s; font-family:inherit;
}
.btn-all:hover { background:rgba(200,150,100,.25); color:var(--accent); }

.search-box {
  width:100%; max-width:300px; padding:6px 14px; margin-bottom:16px;
  border-radius:18px; border:1px solid var(--border); background:var(--card);
  font-size:.82rem; font-family:inherit; color:var(--text); outline:none;
}
.search-box:focus { border-color:var(--accent); }

/* 弹窗 */
.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(40,25,10,.55); backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px); z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .25s,visibility .25s;
}
.modal-overlay.active { opacity:1; visibility:visible; }
.modal-box {
  background:rgba(255,252,246,.96); border-radius:8px; max-width:560px; width:92%;
  max-height:92vh; display:flex; flex-direction:column;
  box-shadow:0 8px 40px rgba(60,30,10,.25);
  padding:24px; position:relative; transform:translateY(12px); transition:transform .25s;
}
.modal-scroll {
  overflow-y:auto; flex:1; padding-right:4px;
}
.modal-overlay.active .modal-box { transform:translateY(0); }
.modal-close {
  position:absolute; top:12px; right:16px; width:28px; height:28px;
  border:none; background:none; font-size:1.2rem; color:var(--soft);
  cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { background:rgba(180,140,100,.12); color:var(--text); }
.modal-body { display:flex; gap:18px; }
.modal-cover { width:120px; height:120px; border-radius:6px; object-fit:cover; flex-shrink:0; }
.modal-info { display:flex; flex-direction:column; gap:10px; min-width:0; }
.modal-title { font-size:1.15rem; font-weight:700; color:var(--brown); line-height:1.3; }
.modal-meta-row { display:flex; gap:8px; flex-wrap:wrap; font-size:.8rem; color:var(--soft); }
.modal-meta-row span { background:rgba(200,160,110,.1); padding:2px 8px; border-radius:3px; }
.modal-synopsis { font-size:.82rem; color:var(--text); line-height:1.7; }
.modal-player { margin-top:4px; padding-top:12px; border-top:1px solid var(--border); flex-shrink:0; min-height:80px; }
.player-fallback { font-size:.78rem; color:var(--soft); padding:8px 0; }
.player-fallback a { color:var(--accent); }

@media(max-width:750px){
  .music-grid{grid-template-columns:1fr}
  .modal-body{flex-direction:column;align-items:center}
  .modal-cover{width:100px;height:100px}
}
</style>
</head>

<section class="subpage">
  <div class="subpage-header">
    <h1 class="subpage-title">音乐</h1>
  </div>
  <input type="text" class="search-box" id="searchBox" placeholder="搜索歌曲、歌手或专辑...">
  <button class="btn-all" id="btnExpandAll">展开全部</button>
  <button class="btn-all" id="btnCollapseAll">折叠全部</button>
  <div id="musicRoot"></div>
</section>

<footer class="footer"><p>揉碎星辰 · 永远在建，永远未完成。</p></footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-scroll">
      <div class="modal-body">
        <img class="modal-cover" id="modalCover" src="" alt="">
        <div class="modal-info">
          <h2 class="modal-title" id="modalTitle"></h2>
          <div class="modal-meta-row" id="modalMeta"></div>
          <p class="modal-synopsis" id="modalSynopsis"></p>
        </div>
      </div>
    </div>
    <div class="modal-player" id="modalPlayer"></div>
  </div>
</div>

<script>
// ========== 歌单数据库 ==========
// 字段: id, cn, album, artist, lyricist, composer, arranger, year, trackNo, duration, sc, cv, ncmId, sp
const DB = [
  // --- eufonius ---
  {id:'clannad_op',cn:'メグメル',source:'CLANNAD',album:'CLANNAD ORIGINAL SOUNDTRACK',artist:['eufonius'],lyricist:'riya',composer:'eufonius',arranger:'菊地創',y:2004,tn:1,dr:0,sc:9.2,cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx2167-pSDBcyc0vjej.jpg',ncm:22706981,sp:'CLANNAD OP。'},
  // --- Chata ---
  {id:'clannad_ed',cn:'だんご大家族',source:'CLANNAD',album:'CLANNAD ORIGINAL SOUNDTRACK',artist:['Chata'],lyricist:'麻枝准',composer:'麻枝准',arranger:'たくまる',y:2004,tn:2,dr:0,sc:9.5,cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx2167-pSDBcyc0vjej.jpg',ncm:760533,sp:'CLANNAD ED。团子大家族。最简单的旋律，最深的感动。'},
  // --- Lia ---
  {id:'clannad_as_op',cn:'時を刻む唄',source:'CLANNAD',album:'時を刻む唄／TORCH',artist:['Lia'],lyricist:'麻枝准',composer:'麻枝准',arranger:'ANANT-GARDE EYES',y:2008,tn:1,dr:0,sc:9.5,cv:'https://cdn.myanimelist.net/images/anime/1299/110774l.jpg',ncm:608667,sp:'CLANNAD AS OP。'},
  {id:'clannad_as_ed',cn:'TORCH',source:'CLANNAD',album:'時を刻む唄／TORCH',artist:['Lia'],lyricist:'魁',composer:'折戸伸治',arranger:'福士健太郎',y:2008,tn:2,dr:0,sc:8.8,cv:'https://cdn.myanimelist.net/images/anime/1299/110774l.jpg',ncm:608669,sp:'CLANNAD AS ED。'},
  {id:'clannad_th',cn:'小さなてのひら',source:'CLANNAD',album:'CLANNAD ORIGINAL SOUNDTRACK',artist:['Riya'],lyricist:'麻枝准',composer:'麻枝准',arranger:'たくまる',y:2004,tn:3,dr:0,sc:9.5,cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx2167-pSDBcyc0vjej.jpg',ncm:22707025,sp:'CLANNAD AS 插入歌。'},

  // --- 独立音乐 ---
  {id:'shin_takara',cn:'新宝島',source:'独立: サカナクション',album:'新宝島',artist:['サカナクション'],lyricist:'山口一郎',composer:'山口一郎',arranger:'サカナクション',y:2015,tn:1,dr:302,sc:9.0,cv:'https://p2.music.126.net/KVJUn2CFzOlS0eLxZIeUcQ==/109951164515338568.jpg',ncm:548556492,sp:'サカナクション的复活之作。'},
];

// ========== 按来源分组 ==========
const sourceOrder = ['CLANNAD','独立: サカナクション'];
const groups = {};
DB.forEach(s => {
  const src = s.source || '其他';
  if (!groups[src]) groups[src] = [];
  groups[src].push(s);
  // 自动发现未列在sourceOrder的来源
  if (!sourceOrder.includes(src)) sourceOrder.push(src);
});
// 组内排序: album → trackNo
for (const src in groups) {
  groups[src].sort((x,y) => x.album.localeCompare(y.album) || x.tn - y.tn);
}

// ========== 渲染 ==========
const root = document.getElementById('musicRoot');
const overlay = document.getElementById('modalOverlay');
let activeIframe = null;

function stopPlayer() {
  if (activeIframe) {
    activeIframe.src = '';
    activeIframe.remove();
    activeIframe = null;
  }
}

function formatDuration(sec) {
  if (!sec) return '';
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function renderCards(items, grid) {
  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'music-card';
    let sub = `<span>${s.album}</span><span>${s.y}</span>`;
    if (s.lyricist) sub += `<span>词:${s.lyricist}</span>`;
    if (s.composer) sub += `<span>曲:${s.composer}</span>`;
    const dur = formatDuration(s.dr);
    if (dur) sub += `<span>${dur}</span>`;

    card.innerHTML =
      `<img class="music-cover" src="${s.cv}" alt="" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2264%22><rect fill=%22%23E8D5B8%22 width=%2264%22 height=%2264%22/><text x=%2232%22 y=%2238%22 text-anchor=%22middle%22 fill=%22%23B09070%22 font-size=%2220%22>🎵</text></svg>';">
       <div class="music-meta">
         <span class="music-title">${s.cn}</span>
         <div class="music-sub">${sub}</div>
       </div>`;
    card.addEventListener('click', () => openModal(s));
    grid.appendChild(card);
  });
}

sourceOrder.forEach(src => {
  const items = groups[src];
  if (!items) return;
  const sec = document.createElement('div');
  sec.className = 'artist-section';
  sec.setAttribute('data-source', src);
  const icon = src.startsWith('独立:') ? '🎸' : '🎬';
  sec.innerHTML = `<div class="artist-head">${icon} ${src}<small>${items.length} 首</small></div>
    <div class="music-grid"></div>`;
  root.appendChild(sec);
  const head = sec.querySelector('.artist-head');
  const grid = sec.querySelector('.music-grid');

  // 默认全部折叠
  grid.style.display = 'none';
  head.classList.add('collapsed');

  // localStorage恢复
  const savedFold = localStorage.getItem('music_fold_' + src);
  if (savedFold === 'open') {
    grid.style.display = '';
    head.classList.remove('collapsed');
  }

  head.addEventListener('click', () => {
    const isCollapsed = head.classList.toggle('collapsed');
    grid.style.display = isCollapsed ? 'none' : '';
    localStorage.setItem('music_fold_' + src, isCollapsed ? 'closed' : 'open');
  });
  renderCards(items, grid);
});

// ========== 搜索 ==========
document.getElementById('searchBox').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('.artist-section').forEach(sec => {
    if (!q) { sec.style.display = ''; return; }
    const artist = (sec.getAttribute('data-source')||'').toLowerCase();
    let match = artist.includes(q);
    sec.querySelectorAll('.music-card').forEach(c => {
      const text = c.textContent.toLowerCase();
      if (!match && text.includes(q)) match = true;
      c.style.display = text.includes(q) || artist.includes(q) ? '' : 'none';
    });
    sec.style.display = match ? '' : 'none';
  });
});

// ========== 折叠按钮 ==========
document.getElementById('btnExpandAll').addEventListener('click', () => {
  document.querySelectorAll('.artist-head').forEach(h => {
    h.classList.remove('collapsed');
    h.nextElementSibling.style.display = '';
    const a = h.closest('.artist-section').getAttribute('data-source');
    localStorage.setItem('music_fold_' + a, 'open');
  });
});
document.getElementById('btnCollapseAll').addEventListener('click', () => {
  document.querySelectorAll('.artist-head').forEach(h => {
    h.classList.add('collapsed');
    h.nextElementSibling.style.display = 'none';
    const a = h.closest('.artist-section').getAttribute('data-source');
    localStorage.setItem('music_fold_' + a, 'closed');
  });
});

// ========== 弹窗 ==========
function openModal(s) {
  stopPlayer();
  document.getElementById('modalCover').src = s.cv;
  document.getElementById('modalTitle').textContent = s.cn;

  let meta = `<span>📅 ${s.y}</span><span>💿 ${s.album}</span>`;
  if (s.lyricist) meta += `<span>✒️ ${s.lyricist}</span>`;
  if (s.composer) meta += `<span>🎼 ${s.composer}</span>`;
  if (s.arranger) meta += `<span>🎹 ${s.arranger}</span>`;
  if (s.dr) meta += `<span>🕐 ${formatDuration(s.dr)}</span>`;
  if (s.sc) meta += `<span>⭐ ${s.sc}</span>`;
  document.getElementById('modalMeta').innerHTML = meta;

  document.getElementById('modalSynopsis').textContent = s.sp || '';

  // 播放器
  const playerDiv = document.getElementById('modalPlayer');
  playerDiv.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.src = `https://music.163.com/outchain/player?type=2&id=${s.ncm}&auto=0&height=90`;
  iframe.width = '100%';
  iframe.height = '100';
  iframe.frameBorder = '0';
  iframe.style.borderRadius = '8px';
  iframe.onerror = () => showFallback(playerDiv, s.ncm);
  activeIframe = iframe;
  playerDiv.appendChild(iframe);

  // 超时检测
  setTimeout(() => {
    if (activeIframe === iframe) {
      // 不做强制fallback, 让iframe正常显示
    }
  }, 3000);

  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showFallback(div, ncm) {
  div.innerHTML = `<div class="player-fallback">播放器加载失败 — <a href="https://music.163.com/song?id=${ncm}" target="_blank">在网易云打开</a></div>`;
}

function closeModal() {
  stopPlayer();
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
</script>

  <script src="../js/guide-characters.js"></script>
