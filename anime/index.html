<style>
.anime-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.anime-card {
  display:flex; gap:14px; padding:14px; border-radius:var(--radius);
  background:var(--card); border:1px solid var(--border);
  cursor:pointer; transition:transform .2s,box-shadow .2s,background .2s;
}
.anime-card:hover { transform:translateY(-2px); box-shadow:0 4px 18px rgba(120,90,60,.12); background:rgba(255,248,236,.9); }
.anime-cover { width:64px; height:90px; border-radius:3px; flex-shrink:0; object-fit:cover; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.anime-meta { display:flex; flex-direction:column; gap:4px; min-width:0; justify-content:center; }
.anime-title { font-size:.9rem; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.anime-sub { font-size:.74rem; color:var(--soft); display:flex; gap:6px; flex-wrap:wrap; }
.anime-sub span { background:rgba(200,160,110,.12); padding:2px 6px; border-radius:3px; }
.anime-sub .tag-change { background:rgba(220,150,80,.18); color:#B06030; font-weight:600; }

.studio-section { margin-bottom:28px; }
.studio-head {
  font-size:1rem; font-weight:700; color:var(--brown);
  padding:8px 0 6px; margin-bottom:12px;
  border-bottom:2px solid rgba(180,150,120,.25); letter-spacing:.04em;
  cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
}
.studio-head::after { content:'▼'; font-size:.65rem; color:var(--soft); transition:transform .25s; }
.studio-head.collapsed::after { transform:rotate(-90deg); }
.studio-head small { font-weight:400; font-size:.78rem; color:var(--soft); margin-left:8px; }

.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(40,25,10,.55); backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px); z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .25s,visibility .25s;
}
.modal-overlay.active { opacity:1; visibility:visible; }
.modal-box {
  background:rgba(255,252,246,.96); border-radius:8px; max-width:620px; width:92%;
  max-height:82vh; overflow-y:auto; box-shadow:0 8px 40px rgba(60,30,10,.25);
  display:flex; gap:20px; padding:24px; position:relative;
  transform:translateY(12px); transition:transform .25s;
}
.modal-overlay.active .modal-box { transform:translateY(0); }
.modal-close {
  position:absolute; top:12px; right:16px; width:28px; height:28px;
  border:none; background:none; font-size:1.2rem; color:var(--soft);
  cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center;
  transition:background .2s,color .2s;
}
.modal-close:hover { background:rgba(180,140,100,.12); color:var(--text); }
.modal-cover-big { width:140px; height:196px; border-radius:4px; object-fit:cover; flex-shrink:0; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.modal-info { display:flex; flex-direction:column; gap:10px; min-width:0; }
.modal-title { font-size:1.2rem; font-weight:700; color:var(--brown); line-height:1.3; }
.modal-meta-row { display:flex; gap:10px; flex-wrap:wrap; font-size:.82rem; color:var(--soft); }
.modal-meta-row span { background:rgba(200,160,110,.1); padding:2px 8px; border-radius:3px; }
.modal-score { font-weight:700; color:var(--accent); }
.modal-synopsis { font-size:.85rem; color:var(--text); line-height:1.8; }
.modal-studio-note { font-size:.82rem; color:#B06030; background:rgba(220,150,80,.1); padding:6px 10px; border-radius:4px; }

@media(max-width:750px){
  .anime-grid{grid-template-columns:1fr}
  .modal-box{flex-direction:column;align-items:center;padding:20px}
  .modal-cover-big{width:120px;height:168px}
}
</style>

  /* ── 1. Kyoto Animation ── */
  {cn:'AIR',                 en:'Air',                    y:2005,e:12,sc:7.27,fs:'Kyoto Animation',s:'Kyoto Animation',g:['剧情','奇幻','恋爱'],cv:'https://cdn.myanimelist.net/images/anime/1825/146531l.jpg',sp:'国崎往人来到海边小镇寻找"天空中的少女"。他遇到了天真烂漫的神尾观铃。夏日、蝉鸣——这场旅程的终点，藏着跨越千年的约定。'},
  {cn:'Kanon',               en:'Kanon (2006)',           y:2006,e:24,sc:7.93,fs:'Kyoto Animation',s:'Kyoto Animation',g:['剧情','恋爱','治愈'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx1530-nkzstlVZhZNG.jpg',sp:'相泽佑一在七年后的冬天回到北方小镇。雪中街道、熟悉的风景，和等待着他的少女们。被遗忘的记忆逐渐苏醒——这不仅仅是冬天的故事，而是关于"约定"的故事。'},

  {cn:'吹响吧！上低音号',    en:'Hibike! Euphonium',     y:2015,e:13,sc:8.03,fs:'Kyoto Animation',s:'Kyoto Animation',g:['音乐','校园','剧情'],cv:'https://cdn.myanimelist.net/images/anime/1517/142072l.jpg',sp:'久美子进入北宇治高中吹奏乐部。"目标是全国大赛"——新顾问泷升的一句话改变了所有人。青春、汗水、不甘——以及上低音号奏出的音色。'},
  {cn:'吹响吧！上低音号 2',  en:'Hibike! Euphonium 2',   y:2016,e:13,sc:8.18,fs:'Kyoto Animation',s:'Kyoto Animation',g:['音乐','校园','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx21460-B52Z2pICE11i.png',sp:'全国大赛后，北宇治吹奏乐部迎来新的挑战。希美学姐的心结、明日香学姐的过去——久美子开始了解身边人的故事。'},
  {cn:'莉兹与青鸟',          en:'Liz to Aoi Tori',       y:2018,e:1, sc:8.19,fs:'Kyoto Animation',s:'Kyoto Animation',g:['音乐','校园','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx100178-MVATisQLOhkp.png',sp:'铠冢霙和伞木希美为主角的剧场版。童话《莉兹与青鸟》与两人的关系相互呼应。双簧管与长笛——分离的悲伤，终要面对的告白。'},
  {cn:'吹响吧！上低音号 ～誓言的终章～',en:'Hibike! Euphonium: Chikai no Finale',y:2019,e:1,sc:8.01,fs:'Kyoto Animation',s:'Kyoto Animation',g:['音乐','校园','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx101992-VZSoKfiRXscs.jpg',sp:'久美子升入高二，新入部的一年级生带来新的摩擦，但目标仍是全国金奖。久美子作为前辈开始承担引导的责任。'},
  {cn:'吹响吧！上低音号 3',  en:'Hibike! Euphonium 3',   y:2024,e:13,sc:8.65,fs:'Kyoto Animation',s:'Kyoto Animation',g:['音乐','校园','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx109731-EwHzbtywdcyG.png',sp:'久美子升入高三，最后的全国大赛。为了不留遗憾，为了所有前辈和后辈——北宇治吹奏乐部的最后一次冲刺。'},

  {cn:'紫罗兰永恒花园',      en:'Violet Evergarden',     y:2018,e:13,sc:8.67,fs:'Kyoto Animation',s:'Kyoto Animation',g:['剧情','奇幻','治愈'],cv:'https://cdn.myanimelist.net/images/anime/1795/95088l.jpg',sp:'战争结束，曾是"武器"的少女薇尔莉特失去了双臂和最重要的人。成为"自动手记人偶"后，在落笔间她开始理解"我爱你"的含义。'},

  {cn:'全金属狂潮？Fumoffu', en:'Full Metal Panic? Fumoffu',y:2003,e:12,sc:7.89,fs:'Gonzo',s:'Kyoto Animation',g:['喜剧','校园'],cv:'https://cdn.myanimelist.net/images/anime/4/75260l.jpg',sp:'校园喜剧篇——宗介的军事脑在和平校园中持续制造笑料。轻松搞笑的外传性质作品。',ch:'※ 制作社变动：Gonzo → Kyoto Animation'},
  {cn:'全金属狂潮！TSR',     en:'Full Metal Panic! The Second Raid',y:2005,e:13,sc:7.91,fs:'Gonzo',s:'Kyoto Animation',g:['动作','科幻','剧情'],cv:'https://cdn.myanimelist.net/images/anime/11/75261l.jpg',sp:'The Second Raid——回归严肃主线。宗介和要面临真正的危机。战场与日常的界限开始模糊。'},
  {cn:'全金属狂潮！IV',      en:'Full Metal Panic! Invisible Victory',y:2018,e:12,sc:7.52,fs:'Gonzo',s:'Xebec',g:['动作','科幻','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx21451-zsRlkUF9sW02.jpg',sp:'Invisible Victory——系列最终章。宗介独自踏上最后的战场。',ch:'※ 制作社变动：Kyoto Animation → Xebec'},

  {cn:'约会大作战 II',       en:'Date A Live II',         y:2014,e:10,sc:7.32,fs:'AIC PLUS+',s:'Production IMS',g:['喜剧','奇幻','恋爱','后宫'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/nx19163-eHXj3mNRaOXt.jpg',sp:'士道继续他的"约会拯救"之旅。新的精灵出现，新的危机逼近。',ch:'※ 制作社变动：AIC PLUS+ → Production IMS'},
  {cn:'约会大作战 III',      en:'Date A Live III',        y:2019,e:12,sc:7.19,fs:'AIC PLUS+',s:'J.C.Staff',g:['喜剧','奇幻','恋爱','后宫'],cv:'https://cdn.myanimelist.net/images/anime/1055/100468l.jpg',sp:'第三季——故事进入更深层的展开。精灵的真相逐渐浮出水面。',ch:'※ 制作社变动：Production IMS → J.C.Staff'},

  {cn:'约会大作战 V',        en:'Date A Live V',          y:2024,e:12,sc:7.82,fs:'AIC PLUS+',s:'Geek Toys',g:['喜剧','奇幻','恋爱','后宫'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx151380-gvN5PjrybTw2.jpg',sp:'最终季——一切真相大白。士道与精灵们的最终战斗。'},

  {cn:'葬送的芙莉莲',        en:'Sousou no Frieren',     y:2023,e:28,sc:9.32,fs:'Madhouse',s:'Madhouse',g:['冒险','奇幻','剧情','治愈'],cv:'https://cdn.myanimelist.net/images/anime/1015/138006l.jpg',sp:'打倒魔王后，勇者队伍解散。精灵芙莉莲独自重走勇者们走过的路。旅途中她逐渐理解那些短暂生命里蕴含的意义。'},

  {cn:'命运石之门',          en:'Steins;Gate',           y:2011,e:24,sc:9.07,fs:'White Fox',s:'White Fox',g:['科幻','悬疑','剧情'],cv:'https://cdn.myanimelist.net/images/anime/1935/127974l.jpg',sp:'自称疯狂科学家的冈部伦太郎，偶然发明向过去发送邮件的时间机器。为了拯救挚爱之人，冈部必须与命运本身抗争。'},

  /* ── 7. A-1 Pictures ── */
  {cn:'我们仍未知道那天所看见的花的名字',en:'AnoHana',y:2011,e:11,sc:8.0,fs:'A-1 Pictures',s:'A-1 Pictures',g:['剧情','恋爱','日常','超自然'],cv:'https://s4.anilist.co/file/anilistcdn/media/anime/cover/medium/bx9989-hImMg6kCMm6I.jpg',sp:'仁太在某个夏天遇到了已故童年玩伴面码的幽灵。面码有个未实现的愿望。于是超和平Busters的六人再次聚在一起。'},
  {cn:'四月是你的谎言',      en:'Shigatsu wa Kimi no Uso',y:2014,e:22,sc:8.64,fs:'A-1 Pictures',s:'A-1 Pictures',g:['音乐','恋爱','校园'],cv:'https://cdn.myanimelist.net/images/anime/1405/143284l.jpg',sp:'天才钢琴少年有马公生失去聆听钢琴的能力。小提琴手宫园薰闯入他的生活，用自由奔放的演奏告诉公生：音乐不是为了完美，是为了传达。而她的时间，只剩下最后一个春天。'},

  /* ── 8. P.A. Works ── */
  {cn:'Angel Beats!',         en:'Angel Beats!',          y:2010,e:13,sc:7.88,fs:'P.A. Works',s:'P.A. Works',g:['奇幻','战斗','校园'],cv:'https://cdn.myanimelist.net/images/anime/1244/111115l.jpg',sp:'音无结弦在死后世界的校园里醒来。他加入与"天使"对抗的"死后世界战线"。随着记忆找回，真相浮出：这个世界的真正目的，是让人学会告别。'},

/* ══════════ 按 firstStudio 分组 ══════════ */
const studioOrder = ['Kyoto Animation','J.C.Staff','Bones','8-bit','Shaft','Gonzo','SILVER LINK.','CoMix Wave','feel.','Toei Animation','SANZIGEN','Sunrise','Studio DEEN','David Production','Trigger','Gainax','Satelight','AIC PLUS+','Madhouse','White Fox','A-1 Pictures','Doga Kobo','P.A. Works'];
const groups = {};
DB.forEach(a => {
  if (!groups[a.fs]) groups[a.fs] = [];
  groups[a.fs].push(a);
});

/* ══════════ 渲染 ══════════ */
const root = document.getElementById('animeRoot');
const overlay = document.getElementById('modalOverlay');

studioOrder.forEach(st => {
  const items = groups[st];
  if (!items) return;
  const sec = document.createElement('div');
  sec.className = 'studio-section';
  sec.innerHTML = `<div class="studio-head">🎬 ${st}<small>${items.length} 部</small></div>
    <div class="anime-grid"></div>`;
  root.appendChild(sec);
  const head = sec.querySelector('.studio-head');
  const grid = sec.querySelector('.anime-grid');
  head.addEventListener('click', () => {
    head.classList.toggle('collapsed');
    grid.style.display = grid.style.display === 'none' ? '' : 'none';
  });

  items.forEach(a => {
    const card = document.createElement('div');
    card.className = 'anime-card';
    // sub row
    let sub = `<span>${a.y}</span><span>${a.g[0]}</span>`;
    sub += `<span>${a.s}</span>`;

    card.innerHTML =
      `<img class="anime-cover" src="${a.cv}" alt="${a.cn}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2290%22><rect fill=%22%23E8D5B8%22 width=%2264%22 height=%2290%22/><text x=%2232%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23B09070%22 font-size=%2224%22>🎬</text></svg>';">
       <div class="anime-meta">
         <span class="anime-title">${a.cn}</span>
         <div class="anime-sub">${sub}</div>
       </div>`;
    card.addEventListener('click', () => openModal(a));
    grid.appendChild(card);
  });
});

/* ══════════ 弹窗 ══════════ */
function openModal(a) {
  document.getElementById('modalCover').src = a.cv;
  document.getElementById('modalTitle').textContent = a.cn;
  document.getElementById('modalMeta').innerHTML =
    `<span>📅 ${a.y}</span> <span>📺 ${a.e} 集</span> <span>🏢 ${a.s}</span> <span class="modal-score">⭐ ${a.sc}</span> <span>${a.g.join(' · ')}</span>`;
  document.getElementById('modalSynopsis').textContent = a.sp;
  const note = document.getElementById('modalStudioNote');
  if (a.ch) { note.textContent = a.ch; note.style.display = 'block'; }
  else note.style.display = 'none';
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  overlay.classList.remove('active'); document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
