<title>轻小说 · 揉碎星辰</title>
<link rel="stylesheet" href="../style.css">
<style>
.ln-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.ln-card {
  display:flex; gap:14px; padding:14px; border-radius:var(--radius);
  background:var(--card); border:1px solid var(--border);
  cursor:pointer; transition:transform .2s,box-shadow .2s,background .2s;
}
.ln-card:hover { transform:translateY(-2px); box-shadow:0 4px 18px rgba(120,90,60,.12); background:rgba(255,248,236,.9); }
.ln-cover { width:64px; height:90px; border-radius:3px; flex-shrink:0; object-fit:cover; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.ln-meta { display:flex; flex-direction:column; gap:4px; min-width:0; justify-content:center; }
.ln-title { font-size:.9rem; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ln-sub { font-size:.74rem; color:var(--soft); display:flex; gap:6px; flex-wrap:wrap; }
.ln-sub span { background:rgba(200,160,110,.12); padding:2px 6px; border-radius:3px; }

.pub-section { margin-bottom:28px; }
.pub-head {
  font-size:1rem; font-weight:700; color:var(--brown);
  padding:8px 0 6px; margin-bottom:12px;
  border-bottom:2px solid rgba(180,150,120,.25); letter-spacing:.04em;
  cursor:pointer; user-select:none;
  display:flex; align-items:center; justify-content:space-between;
}
.pub-head::after { content:'▼'; font-size:.65rem; color:var(--soft); transition:transform .25s; }
.pub-head.collapsed::after { transform:rotate(-90deg); }
.pub-head small { font-weight:400; font-size:.78rem; color:var(--soft); margin-left:8px; }

.modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(40,25,10,.55); backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px); z-index:200;
  display:flex; align-items:center; justify-content:center;
  opacity:0; visibility:hidden; transition:opacity .25s,visibility .25s;
}
.modal-overlay.active { opacity:1; visibility:visible; }
.modal-box {
  background:rgba(255,252,246,.96); border-radius:8px; max-width:620px; width:92%;
  max-height:82vh; overflow-y:auto; box-shadow:0 8px 40px rgba(60,30,10,.25);
  display:flex; gap:20px; padding:24px; position:relative;
  transform:translateY(12px); transition:transform .25s;
}
.modal-overlay.active .modal-box { transform:translateY(0); }
.modal-close {
  position:absolute; top:12px; right:16px; width:28px; height:28px;
  border:none; background:none; font-size:1.2rem; color:var(--soft);
  cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center;
  transition:background .2s,color .2s;
}
.modal-close:hover { background:rgba(180,140,100,.12); color:var(--text); }
.modal-cover-big { width:140px; height:196px; border-radius:4px; object-fit:cover; flex-shrink:0; background:linear-gradient(140deg,#EEE0D0,#DDD0BB); }
.modal-info { display:flex; flex-direction:column; gap:10px; min-width:0; }
.modal-title { font-size:1.2rem; font-weight:700; color:var(--brown); line-height:1.3; }
.modal-meta-row { display:flex; gap:10px; flex-wrap:wrap; font-size:.82rem; color:var(--soft); }
.modal-meta-row span { background:rgba(200,160,110,.1); padding:2px 8px; border-radius:3px; }
.modal-score { font-weight:700; color:var(--accent); }
.modal-synopsis { font-size:.85rem; color:var(--text); line-height:1.8; }

@media(max-width:750px){
  .ln-grid{grid-template-columns:1fr}
  .modal-box{flex-direction:column;align-items:center;padding:20px}
  .modal-cover-big{width:120px;height:168px}
}
</style>
</head>

<script>
// ========== 轻小说数据库 ==========
const DB = [
  /* ── 電撃文庫（ASCII Media Works） ── */
  {cn:'魔法禁书目录',en:'Toaru Majutsu no Index',y:2004,v:22,sc:8.2,pub:'電撃文庫',author:'鎌池和馬',g:['奇幻','科幻','超能力'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx42854-IOa3uoHblsCB.png',sp:'学园都市——住着230万人口、其中80%是学生的超能力城市。上条当麻拥有消除一切超能力的右手幻想杀手。他与从天而降的纯白修女茵蒂克丝相遇，从此被卷入科学与魔法交织的冲突之中。全22卷的旧约篇。'},
  {cn:'魔法禁书目录 新约',en:'Shinyaku Toaru Majutsu no Index',y:2011,v:23,sc:8.6,pub:'電撃文庫',author:'鎌池和馬',g:['奇幻','科幻','超能力'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx54875-X5s1ShPXq8Ah.jpg',sp:'新约篇。第三次世界大战结束后，学园都市迎来了新的时代。当麻与魔神欧提努斯的相遇。面对的威胁从魔法结社升级为至高存在。全23卷。'},
  {cn:'魔法禁书目录 创约',en:'Souyaku Toaru Majutsu no Index',y:2020,v:10,sc:8.3,pub:'電撃文庫',author:'鎌池和馬',g:['奇幻','科幻','超能力'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx113891-o3uswCSV8jCh.jpg',sp:'创约篇。圣诞节后。新的势力、新的敌人，以及上条当麻本人真正的秘密逐渐浮出水面。连载中。'},
  {cn:'86 -不存在的战区-',en:'86: Eighty Six',y:2017,v:13,sc:8.8,pub:'電撃文庫',author:'安里アサト',g:['科幻','军事','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx98610-TIf7R1gkU0vc.jpg',sp:'圣玛格诺利亚共和国遭受军团无人机攻击。少年兵辛耶驾驶机体奔赴战场。在隔绝的85区之外，是操纵着白系种的少佐蕾娜——两人通过声音相连，在战火中互相支撑。'},
  {cn:'86 -不存在的战区- Alter',en:'86: Alter',y:2023,v:4,sc:6.5,pub:'電撃文庫',author:'安里アサト',g:['科幻','军事','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx162703-Bh4qKZZgFibG.png',sp:'外侧短篇集。以辛、蕾娜和其他角色视角展开的侧写故事。在主线没有触及的地方，每个人都有自己的战斗。'},
  {cn:'安达与岛村',en:'Adachi to Shimamura',y:2012,v:13,sc:8.4,pub:'電撃文庫',author:'入間人間',g:['恋爱','校园','日常'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx92550-gIC8HZR1cun2.jpg',sp:'安达樱与岛村抱月——两个逃课少女在体育馆二楼的相遇。从漫不经心的闲聊到无法忽视的在意。入間人間笔下最细腻的百合恋爱故事。'},
  {cn:'凉宫春日系列',en:'Suzumiya Haruhi Series',y:2003,v:12,sc:8.3,pub:'角川スニーカー文庫',author:'谷川流',g:['奇幻','校园','喜剧'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx33083-tlDz3pkPz1Mc.jpg',sp:'我对普通的人类没有兴趣。你们中如果有外星人、未来人、异世界人或超能力者，请来找我——凉宫春日的宣言改变了一切。SOS团、宇宙人、封闭空间。一部重新定义了轻小说这种形式的作品。'},
  {cn:'物语系列 第一季',en:'Monogatari First Season',y:2006,v:2,sc:8.7,pub:'講談社BOX',author:'西尾維新',g:['奇幻','悬疑','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx44893-aV0XRP0OfWf7.jpg',sp:'含化物语上下、伤物语、伪物语上下、猫物语黑。阿良良木历在春假最后一天遇到了没有影子的少女战场原黑仪。怪异与人心的故事由此展开。西尾维新×VOFAN的生涯代表作。'},
  {cn:'物语系列 第二季',en:'Monogatari Second Season',y:2010,v:1,sc:8.8,pub:'講談社BOX',author:'西尾維新',g:['奇幻','悬疑','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx53751-1PHRYYsVP2cE.jpg',sp:'含猫物语白、倾物语、花物语、囮物语、鬼物语、恋物语。以羽川翼、八九寺、骏河、抚子、忍野、战场原为叙述者的六部作品。'},
  {cn:'物语系列 最终季',en:'Monogatari Final Season',y:2012,v:1,sc:8.4,pub:'講談社BOX',author:'西尾維新',g:['奇幻','悬疑','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx74227-mjLz68FCTTKT.jpg',sp:'含凭物语、终物语上中下、续终物语。历的高中三年进入尾声。与忍野扇的相遇揭开了最后的谜底。物语系列的终结。'},
  {cn:'物语系列 Off Season',en:'Monogatari Off Season',y:2015,v:1,sc:8.2,pub:'講談社BOX',author:'西尾維新',g:['奇幻','悬疑','剧情'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx96019-YkPag7iKMXiF.jpg',sp:'含愚物语、业物语、抚物语等。物语系列的后日谈与续写。高中毕业后，每个角色的道路仍然继续。'},

  {cn:'约会大作战',en:'Date A Live',y:2011,v:22,sc:8.0,pub:'電撃文庫',author:'橘公司',g:['奇幻','恋爱','喜剧','后宫'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx67523-mzbSAv4NHsvY.jpg',sp:'五河士道拥有与精灵约会使其娇羞从而封印力量的能力。为了拯救被人类视为灾厄的精灵少女们，士道的约会拯救之旅开始了。全22卷完结。'},

  /* ── MF文庫J ── */
  {cn:'游戏人生',en:'No Game No Life',y:2012,v:12,sc:8.1,pub:'MF文庫J',author:'榎宮祐',g:['奇幻','冒险','策略'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx78399-ohUhCDKw0CJs.jpg',sp:'空和白——在游戏中无敌的兄妹被自称神的少年特图召唤到异世界。那里一切争端由游戏决定。不在场的两人要用智力与棋艺征服这个世界。全12卷，连载再开。'},
  {cn:'人妻女教师被女高中生迷得神魂颠倒',en:'Hitozuma Kyoushi ga Joshikousei ni Dohamari Suru Hanashi',y:2024,v:3,sc:6.5,pub:'電撃文庫',author:'入間人間',g:['恋爱','校园','喜剧','百合'],cv:'https://s4.anilist.co/file/anilistcdn/media/manga/cover/medium/bx185410-yn7oNvxu0zXm.jpg',sp:'入間人間继安达与岛村之后的百合新作。教师与学生的禁断恋爱故事。'},
];

// ========== 按出版社分组 ==========
const pubOrder = ['電撃文庫','角川スニーカー文庫','MF文庫J','講談社BOX'];
const groups = {};
DB.forEach(a => {
  if (!groups[a.pub]) groups[a.pub] = [];
  groups[a.pub].push(a);
});

// ========== 渲染 ==========
const root = document.getElementById('lnRoot');
const overlay = document.getElementById('modalOverlay');

pubOrder.forEach(pub => {
  const items = groups[pub];
  if (!items) return;
  const sec = document.createElement('div');
  sec.className = 'pub-section';
  sec.innerHTML = `<div class="pub-head">📚 ${pub}<small>${items.length} 部</small></div>
    <div class="ln-grid"></div>`;
  root.appendChild(sec);
  const head = sec.querySelector('.pub-head');
  const grid = sec.querySelector('.ln-grid');
  head.addEventListener('click', () => {
    head.classList.toggle('collapsed');
    grid.style.display = grid.style.display === 'none' ? '' : 'none';
  });

  items.forEach(a => {
    const card = document.createElement('div');
    card.className = 'ln-card';
    let sub = `<span>${a.y}</span><span>${a.g[0]}</span><span>${a.author}</span>`;
    card.innerHTML =
      `<img class="ln-cover" src="${a.cv}" alt="${a.cn}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2264%22 height=%2290%22><rect fill=%22%23E8D5B8%22 width=%2264%22 height=%2290%22/><text x=%2232%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23B09070%22 font-size=%2224%22>📝</text></svg>';">
       <div class="ln-meta">
         <span class="ln-title">${a.cn}</span>
         <div class="ln-sub">${sub}</div>
       </div>`;
    card.addEventListener('click', () => openModal(a));
    grid.appendChild(card);
  });
});

function openModal(a) {
  document.getElementById('modalCover').src = a.cv;
  document.getElementById('modalTitle').textContent = a.cn;
  document.getElementById('modalMeta').innerHTML =
    `<span>📅 ${a.y}</span> <span>📖 ${a.v} 卷</span> <span>✒️ ${a.author}</span> <span>📚 ${a.pub}</span> <span class="modal-score">⭐ ${a.sc}</span> <span>${a.g.join(' · ')}</span>`;
  document.getElementById('modalSynopsis').textContent = a.sp;
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  overlay.classList.remove('active'); document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>

  <script src="../js/guide-characters.js"></script>

</body>
